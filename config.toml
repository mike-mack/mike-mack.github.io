languageCode = "en-us"
theme = "hugo-blog-awesome"
publishDir = "docs"
canonifyURLs = false
relativeURLs = true
title = "michaelmackinnon.io"
slogan = "Security Engineering Notes"

[params.assets]
css = ["css/custom.css"]

[params.nav]
showCategories = true
showTags = false

[[params.nav.custom]]
title = "About"
url = "/about"

[Languages.en-gb.params]
  defaultColor = "dark" # set color mode: dark, light, auto
  [[Languages.en-gb.menu.main]]
